<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Miraziz — Админка заявок</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">M</span>
      <div>
        <h1>Заявки</h1>
        <p class="muted" id="apiStatus">Проверка соединения…</p>
      </div>
    </div>
    <button class="btn primary" id="newBtn">+ Новая заявка</button>
  </header>

  <section class="controls">
    <div class="filters" id="statusFilters">
      <button class="chip active" data-status="">Все</button>
      <button class="chip" data-status="new">Новые</button>
      <button class="chip" data-status="in_progress">В работе</button>
      <button class="chip" data-status="done">Готово</button>
      <button class="chip" data-status="rejected">Отклонено</button>
    </div>
    <input type="search" id="searchInput" placeholder="Поиск по имени, телефону, e-mail…" />
  </section>

  <main>
    <div id="stats" class="stats"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Имя</th>
            <th>Телефон / WhatsApp</th>
            <th>Email</th>
            <th>Проект</th>
            <th>Сообщение</th>
            <th>Статус</th>
            <th>Создана</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" class="empty">Загрузка…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Модалка создания/редактирования -->
  <div class="modal-overlay" id="modal" hidden>
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalTitle">Новая заявка</h2>
        <button class="icon-btn" id="modalClose">✕</button>
      </div>
      <form id="appForm">
        <input type="hidden" id="appId" />
        <label>Имя *
          <input type="text" id="fName" required maxlength="120" />
        </label>
        <label>Телефон / WhatsApp *
          <input type="text" id="fPhone" required maxlength="40" />
        </label>
        <label>Email
          <input type="email" id="fEmail" maxlength="160" />
        </label>
        <label>Интересующий проект
          <input type="text" id="fProject" maxlength="200" />
        </label>
        <label>Сообщение
          <textarea id="fMessage" rows="3" maxlength="2000"></textarea>
        </label>
        <label>Статус
          <select id="fStatus">
            <option value="new">Новая</option>
            <option value="in_progress">В работе</option>
            <option value="done">Готово</option>
            <option value="rejected">Отклонено</option>
          </select>
        </label>
        <div class="form-error" id="formError"></div>
        <div class="modal-actions">
          <button type="button" class="btn" id="cancelBtn">Отмена</button>
          <button type="submit" class="btn primary">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
